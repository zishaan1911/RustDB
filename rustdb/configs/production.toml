# Production Configuration

[server]
host = "0.0.0.0"
port = 5432
workers = 8
timeout_ms = 60000

[database]
path = "/data/rustdb_prod.db"
cache_size_mb = 4096
page_size = 8192

[logging]
level = "warn"
format = "json"

[security]
tls_enabled = true
auth_enabled = true

[ml]
cache_size = 200
model_dir = "/models"

[observability]
metrics_enabled = true
tracing_enabled = true
slow_query_threshold_ms = 10000
