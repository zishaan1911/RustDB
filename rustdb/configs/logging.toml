# Logging Configuration

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Format: pretty, json, compact
format = "json"

# Output destinations
outputs = ["stdout", "file"]

# File configuration
file_path = "/var/log/rustdb/rustdb.log"
max_size_mb = 100
max_backups = 10
compress = true

# Span and event configuration
with_spans = true
with_targets = true
with_file_and_line = true
with_thread_ids = true
with_thread_names = true

# Async configuration
async_enabled = true
max_queue_size = 10000
