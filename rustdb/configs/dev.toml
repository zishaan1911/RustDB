# Development Configuration

[server]
host = "127.0.0.1"
port = 5432
workers = 2
timeout_ms = 30000

[database]
path = "./data/rustdb_dev.db"
cache_size_mb = 256
page_size = 8192

[logging]
level = "debug"
format = "pretty"

[security]
tls_enabled = false
auth_enabled = true

[ml]
cache_size = 10
model_dir = "./models"

[observability]
metrics_enabled = true
tracing_enabled = true
slow_query_threshold_ms = 1000
