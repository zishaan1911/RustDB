version: '3.8'

services:
  rustdb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
      - "9090:9090"
    environment:
      - LOG_LEVEL=info
      - RUST_BACKTRACE=1
    volumes:
      - rustdb_data:/data
      - ./configs:/etc/rustdb/configs
    networks:
      - rustdb_network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rustdb
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rustdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rustdb_network

volumes:
  rustdb_data:
  postgres_data:

networks:
  rustdb_network:
    driver: bridge
