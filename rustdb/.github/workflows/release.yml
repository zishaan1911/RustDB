name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build release
        run: cargo build --release --all
      
      - name: Run tests
        run: cargo test --release --all
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/rustdb-server
            target/release/rustdb-cli
            target/release/rustdb-backup
